name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - run: make verify
      - name: Generate coverage
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - run: make package
      - name: Dry-run publish (high version to avoid conflicts)
        run: |
          node -e "const p=require('./package.json');p.version='999.999.999';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --dry-run --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
