name: CI

on:
  push:
    branches-ignore:
      - 'v*.*.*'
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: make verify
      - run: make package
      - run: make verify-publish
        env:
          GITHUB_PUBLISH_OWNER: ${{ secrets.GITHUB_OWNER }}
