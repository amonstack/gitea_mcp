name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify
        run: make verify

      - name: Package
        run: make package
        env:
          GITHUB_PUBLISH_OWNER: ${{ secrets.GITHUB_OWNER }}

      - name: Publish
        run: make publish
        env:
          GITHUB_PUBLISH_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            .dist/github/releases/*.tgz \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
